services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: meshops
      POSTGRES_USER: meshops
      POSTGRES_PASSWORD: meshops

  redis:
    image: redis:8

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
